## Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/to/imgs1, path/to/imgs2, ..]
#path: /home/chenkejing/database/AITotal_SegmentDatabase/wireDatabaseSegment # dataset root dir
#train: images/train # train images (relative to 'path') 4 images
#val: images/val # val images (relative to 'path') 4 images
#test: # test images (optional)
#
## Classes
#names:
#  0: wire

# ⭐ 全局类别（统一空间）

# cross_dataset.yaml

# -----------------------------
# Global Class Definition
# -----------------------------
nc: 2

names:
  0: carpet
  1: wire

# 兼容 Ultralytics
train: dummy
val: dummy

# 是否开启跨数据集训练
cross_dataset: True

# -----------------------------
# Multiple datasets
# -----------------------------
multi_datasets:

  - name: carpet_0

    id: 0

    weight: 1.0

    nc: 1

    train: /data/database/AITotal_SegmentDatabase/carpetDatabaseSegment/images/val

    val: /data/database/AITotal_SegmentDatabase/carpetDatabaseSegment/images/val

    data:

      names:
        0: carpet

      # local -> global
      class_map:
        0: 0

      # global class mask
      class_mask:
        - 1
        - 0


  - name: wire_1

    id: 1

    weight: 5.0

    nc: 1

    train: /data/database/AITotal_SegmentDatabase/wireDatabaseSegment/images/val

    val: /data/database/AITotal_SegmentDatabase/wireDatabaseSegment/images/val

    data:

      names:
        0: wire

      class_map:
        0: 1

      class_mask:
        - 0
        - 1